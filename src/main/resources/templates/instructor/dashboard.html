<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Instructor Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:insert="layout/navbar"></div>

<div class="container" style="margin-top: 40px;">
    <section class="cards">
        <div class="card">
            <h3>My Courses</h3>
            <p th:text="${totalCourses}">0</p>
        </div>
        <div class="card">
            <h3>Total Enrollments</h3>
            <p th:text="${totalEnrollments}">0</p>
        </div>
        <div class="card">
            <h3>Active Subscribers</h3>
            <p id="subscriberCount">--</p>
        </div>
        <div class="card">
            <h3>Avg. Rating</h3>
            <p id="avgRating">--</p>
        </div>
    </section>

    <section class="section">
        <h2>👨‍🏫 My Courses</h2>
        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>Course</th>
                        <th>Level</th>
                        <th>Subscribers</th>
                        <th>Enrollments</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.title}">Course</td>
                        <td><span class="badge badge-published" th:text="${course.level}">Level</span></td>
                        <td class="subscriber-count" th:data-course-id="${course.id}">--</td>
                        <td th:text="${course.id}">0</td>
                        <td th:text="${#numbers.formatDecimal(course.rating, 1, 1) + '★'}">--</td>
                        <td class="actions">
                            <a th:href="@{/ui/instructor/{courseId}/design(courseId=${course.id})}" class="btn-small">Design</a>
                            <a th:href="@{/ui/instructor/{courseId}/analytics(courseId=${course.id})}" class="btn-small">Analytics</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="section">
        <h2>📊 Recent Enrollments</h2>
        <div id="recentEnrollments" style="text-align: center; color: #718096;">
            Loading enrollments...
        </div>
    </section>
</div>

<script>
    // Load subscriber counts
    document.querySelectorAll('.subscriber-count').forEach(el => {
        const courseId = el.dataset.courseId;
        fetch(`/api/courses/${courseId}/subscribers`)
            .then(r => r.json())
            .then(data => el.textContent = data.count || 0)
            .catch(e => el.textContent = '0');
    });

    // Load recent enrollments
    fetch('/api/enrollments')
        .then(r => r.json())
        .then(enrollments => {
            const html = enrollments.slice(0, 5).map(e => `
                <div style="padding: 12px; border-bottom: 1px solid #e2e8f0;">
                    <strong>${e.userId}</strong> enrolled in <strong>${e.courseId}</strong>
                    - Progress: ${e.progress}%
                </div>
            `).join('');
            document.getElementById('recentEnrollments').innerHTML = html || '<p>No enrollments</p>';
        });
</script>

<style>
    .badge-published {
        background: #faf089;
        color: #744210;
    }

    .btn-small {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        background: #667eea;
        color: white;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
    }

    .btn-small:hover {
        background: #5568d3;
        transform: translateY(-1px);
    }
</style>
</body>
</html>
