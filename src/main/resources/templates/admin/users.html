<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Manage Users - EduLearn</title>
    <th:block th:replace="~{layout/navbar :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/navbar :: chrome}"></th:block>

<div class="panel">
    <div class="panel-header">
        <h2>👥 Manage Users</h2>
    </div>

    <form method="get" th:action="@{/ui/admin/users}">
        <div class="table-toolbar">
            <input type="text" name="search" th:value="${search}" placeholder="🔍 Search users…" oninput="this.form.submit()"/>
            <select name="sort" onchange="this.form.submit()">
                <option value="createdAt" th:selected="${sort=='createdAt'}">Newest</option>
                <option value="firstName" th:selected="${sort=='firstName'}">Name A-Z</option>
            </select>
            <span class="toolbar-spacer"></span>
            <span style="font-size:13px;color:var(--text-muted)" th:if="${usersPage != null}"
                  th:text="'Showing ' + ${usersPage.numberOfElements} + ' of ' + ${usersPage.totalElements}"></span>
        </div>
    </form>

    <div style="overflow-x:auto">
        <table class="data-table">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="u : ${usersPage.content}">
                <td>
                    <div style="display:flex;align-items:center;gap:10px">
                        <div style="width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white"
                             th:text="${#strings.substring(u.firstName,0,1)+#strings.substring(u.lastName,0,1)}"></div>
                        <span style="font-weight:600" th:text="${u.firstName+' '+u.lastName}"></span>
                    </div>
                </td>
                <td style="color:var(--text-muted)" th:text="${u.email}"></td>
                <td>
                    <span th:switch="${u.role}">
              <span th:case="'ADMIN'" class="badge badge-red">Admin</span>
              <span th:case="'INSTRUCTOR'" class="badge badge-purple">Instructor</span>
              <span th:case="*" class="badge badge-blue">Student</span>
            </span>
                </td>
                <td>
                    <span th:if="${u.isActive}" class="badge badge-green">Active</span>
                    <span th:unless="${u.isActive}" class="badge badge-red">Inactive</span>
                    <span th:if="${u.approvalStatus == 'PENDING'}" class="badge badge-yellow" style="margin-left:4px">Pending</span>
                </td>
                <td style="color:var(--text-muted);font-size:13px" th:text="${u.createdAt}"></td>
                <td>
                    <div style="display:flex;gap:6px">
                        <form th:action="@{/ui/admin/users/{id}/toggle-active(id=${u.id})}" method="post" style="margin:0">
                            <button class="btn btn-sm btn-ghost" th:text="${u.isActive ? '🚫 Disable' : '✅ Enable'}"></button>
                        </form>
                        <form th:action="@{/ui/admin/users/{id}/update-role(id=${u.id})}" method="post" style="margin:0;display:flex;gap:4px">
                            <select name="role" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:8px;font-size:12px">
                                <option value="STUDENT" th:selected="${u.role=='STUDENT'}">Student</option>
                                <option value="INSTRUCTOR" th:selected="${u.role=='INSTRUCTOR'}">Instructor</option>
                                <option value="ADMIN" th:selected="${u.role=='ADMIN'}">Admin</option>
                            </select>
                            <button class="btn btn-sm btn-ghost">Set</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${usersPage == null or usersPage.content.isEmpty()}">
                <td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">No users found</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div style="padding:16px 20px;border-top:1px solid var(--border)" th:if="${usersPage != null and usersPage.totalPages > 1}">
        <div class="pagination">
            <a th:if="${!usersPage.first}" th:href="@{/ui/admin/users(page=${usersPage.number-1},size=${usersPage.size},sort=${sort},search=${search})}">‹ Prev</a>
            <span class="pg-disabled" th:unless="${!usersPage.first}">‹ Prev</span>
            <th:block th:each="i : ${#numbers.sequence(0, usersPage.totalPages - 1)}">
                <a th:if="${i != usersPage.number}" th:href="@{/ui/admin/users(page=${i},size=${usersPage.size},sort=${sort},search=${search})}" th:text="${i+1}"></a>
                <span th:if="${i == usersPage.number}" class="pg-active" th:text="${i+1}"></span>
            </th:block>
            <a th:if="${!usersPage.last}" th:href="@{/ui/admin/users(page=${usersPage.number+1},size=${usersPage.size},sort=${sort},search=${search})}">Next ›</a>
            <span class="pg-disabled" th:unless="${!usersPage.last}">Next ›</span>
        </div>
    </div>
</div>
</main>
</body>
</html>
