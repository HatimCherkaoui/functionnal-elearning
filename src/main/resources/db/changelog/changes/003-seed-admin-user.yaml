databaseChangeLog:
  - changeSet:
      id: 003-seed-admin-user
      author: elearning
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: first_name
                  value: Admin
              - column:
                  name: last_name
                  value: User
              - column:
                  name: email
                  value: admin@elearning.com
              - column:
                  # BCrypt hash for "admin123" - verified working hash from BCryptHashGenerator test
                  name: password
                  value: "$2a$10$T2vKexYNM7IfVwcsMfqfMuT1d5SEdi9XYZRRyb7GTHfe9g7kI16x6"
              - column:
                  name: role
                  value: ADMIN
              - column:
                  name: is_active
                  valueBoolean: true
              - column:
                  name: approval_status
                  value: APPROVED
              - column:
                  name: created_at
                  valueDate: now()
              - column:
                  name: updated_at
                  valueDate: now()
      rollback:
        - delete:
            tableName: users
            where: email='admin@elearning.com'

