              - column:
                  name: points
                  type: INT
                  defaultValueNumeric: 1
              - column:
                  name: quiz_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
