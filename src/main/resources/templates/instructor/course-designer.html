<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Course Designer</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">
</head>
<body>
<div th:insert="layout/navbar"></div>

<div class="container" style="margin-top: 40px;">
    <section class="section">
        <h2>✏️ Course Designer - Add Lessons & Content</h2>

        <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 30px;">
            <!-- Left: Lesson Steps -->
            <div>
                <h3>📚 Lesson Steps</h3>
                <div id="stepsList" style="margin-top: 16px;">
                    <p style="color: #718096;">No steps yet</p>
                </div>
                <button class="btn-primary" id="addStepBtn" style="width: 100%; margin-top: 16px;">+ Add Step</button>
            </div>

            <!-- Right: Step Editor -->
            <div>
                <div id="stepEditor" style="display: none;">
                    <h3>Edit Step</h3>

                    <div style="margin-bottom: 16px;">
                        <label style="font-weight: 600;">Step Type</label>
                        <select id="stepType" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
                            <option value="CONTENT">📝 Content (Rich Text)</option>
                            <option value="CODE">💻 Code Snippet</option>
                            <option value="QUESTION">❓ Question (Quiz)</option>
                            <option value="VIDEO">🎥 Video</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 16px;">
                        <label style="font-weight: 600;">Title</label>
                        <input id="stepTitle" type="text" placeholder="Step title" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
                    </div>

                    <!-- Content Editor -->
                    <div id="contentSection" style="margin-bottom: 16px;">
                        <label style="font-weight: 600;">Content</label>
                        <div id="editor" style="height: 200px; border: 1px solid #ccc; border-radius: 8px; background: white;"></div>
                    </div>

                    <!-- Code Snippet -->
                    <div id="codeSection" style="margin-bottom: 16px; display: none;">
                        <label style="font-weight: 600;">Language</label>
                        <select id="programmingLanguage" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="sql">SQL</option>
                        </select>
                        <label style="font-weight: 600; display: block; margin-top: 8px;">Code</label>
                        <textarea id="codeSnippet" style="width: 100%; height: 150px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace;"></textarea>
                    </div>

                    <!-- Question -->
                    <div id="questionSection" style="margin-bottom: 16px; display: none;">
                        <label style="font-weight: 600;">Question Type</label>
                        <select id="questionType" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
                            <option value="MULTIPLE_CHOICE">Multiple Choice</option>
                            <option value="TRUE_FALSE">True/False</option>
                        </select>

                        <label style="font-weight: 600; display: block; margin-top: 8px;">Question Text</label>
                        <input id="questionText" type="text" placeholder="Enter question" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px;">

                        <label style="font-weight: 600; display: block; margin-top: 8px;">Options (one per line)</label>
                        <textarea id="questionOptions" style="width: 100%; height: 100px; padding: 8px; border: 1px solid #ccc; border-radius: 8px;"></textarea>

                        <label style="font-weight: 600; display: block; margin-top: 8px;">Correct Answer</label>
                        <input id="correctAnswer" type="text" placeholder="Enter correct answer" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px;">
                    </div>

                    <div style="display: flex; gap: 8px; margin-top: 16px;">
                        <button class="btn-primary" id="saveStepBtn" style="flex: 1;">Save Step</button>
                        <button id="cancelEditBtn" style="flex: 1; padding: 10px; border: 2px solid #ccc; background: white; border-radius: 8px; cursor: pointer;">Cancel</button>
                    </div>
                </div>

                <div id="noSelection" style="text-align: center; padding: 40px; color: #718096;">
                    <p>👈 Select or create a step to edit</p>
                </div>
            </div>
        </div>
    </section>
</div>

<script>
    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                ['code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    // Step type change
    document.getElementById('stepType').addEventListener('change', (e) => {
        document.getElementById('contentSection').style.display = e.target.value === 'CONTENT' ? 'block' : 'none';
        document.getElementById('codeSection').style.display = e.target.value === 'CODE' ? 'block' : 'none';
        document.getElementById('questionSection').style.display = e.target.value === 'QUESTION' ? 'block' : 'none';
    });

    // Add step
    document.getElementById('addStepBtn').addEventListener('click', () => {
        document.getElementById('stepEditor').style.display = 'block';
        document.getElementById('noSelection').style.display = 'none';
        quill.setContents([]);
    });

    // Save step
    document.getElementById('saveStepBtn').addEventListener('click', () => {
        const stepData = {
            title: document.getElementById('stepTitle').value,
            type: document.getElementById('stepType').value,
            content: quill.getContents(),
            htmlContent: quill.root.innerHTML,
            code: document.getElementById('codeSnippet').value,
            question: {
                text: document.getElementById('questionText').value,
                type: document.getElementById('questionType').value,
                options: document.getElementById('questionOptions').value.split('\n'),
                correct: document.getElementById('correctAnswer').value
            }
        };

        console.log('Step saved:', stepData);
        // Send to backend
        alert('Step saved! (Implementation pending)');
    });

    document.getElementById('cancelEditBtn').addEventListener('click', () => {
        document.getElementById('stepEditor').style.display = 'none';
        document.getElementById('noSelection').style.display = 'block';
    });
</script>

<style>
    .ql-toolbar {
        border-top-left-radius: 8px !important;
        border-top-right-radius: 8px !important;
    }

    .ql-container {
        border-bottom-left-radius: 8px !important;
        border-bottom-right-radius: 8px !important;
        font-size: 14px;
    }
</style>
</body>
</html>
