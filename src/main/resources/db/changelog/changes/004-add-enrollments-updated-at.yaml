databaseChangeLog:
  - changeSet:
      id: 004-add-enrollments-updated-at
      author: elearning
      changes:
        - addColumn:
            tableName: enrollments
            columns:
              - column:
                  name: updated_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: enrollments
            columnName: updated_at

