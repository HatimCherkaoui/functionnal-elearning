# Test datasource - Testcontainers overrides via @DynamicPropertySource
spring.datasource.url=jdbc:tc:mysql:8.0:///elearning_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test

# Liquibase - enabled in tests (Testcontainers MySQL)
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Logging for troubleshooting
logging.level.liquibase=DEBUG
logging.level.liquibase.changelog=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG

# Kafka - overridden by @DynamicPropertySource in test
spring.kafka.consumer.group-id=elearning-test-group
spring.kafka.consumer.auto-offset-reset=earliest

# Thymeleaf
spring.thymeleaf.check-template-location=false

# File upload
spring.servlet.multipart.enabled=true
app.upload.dir=/tmp/test-uploads
