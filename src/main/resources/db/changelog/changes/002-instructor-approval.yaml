databaseChangeLog:
  - changeSet:
      id: 002-add-instructor-approval-fields
      author: elearning
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: approval_status
                  type: VARCHAR(50)
                  defaultValue: APPROVED
                  constraints:
                    nullable: true
              - column:
                  name: rejection_reason
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: bio
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: profile_picture
                  type: VARCHAR(500)
                  constraints:
                    nullable: true

  - changeSet:
      id: 002-create-instructor-documents-table
      author: elearning
      changes:
        - createTable:
            tableName: instructor_documents
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: original_name
                  type: VARCHAR(500)
              - column:
                  name: file_type
                  type: VARCHAR(100)
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: uploaded_at
                  type: DATETIME
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: instructor_documents
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_doc_user
            onDelete: CASCADE

